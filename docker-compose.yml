version: '3.4'

services:
  workingcalendar.server:
    image: ${DOCKER_REGISTRY-}workingcalendarserver
    hostname: workingcalendar.server
    container_name: workingcalendar.server
    build:
      context: .
      dockerfile: workingcalendar.server/Dockerfile
    ports:
      - 21080:21080
      - 21443:21443
    networks:
      workingcalendar:
  workingcalendar.postgres:
    image: postgres
    hostname: workingcalendar.postgres
    container_name: workingcalendar.postgres
    environment:
      - POSTGRES_PASSWORD=workingcalendar
      - POSTGRES_ADMIN=workingcalendar
    ports:
      - 5432:5432
    networks:
      workingcalendar:
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.pssql:/docker-entrypoint-initdb.d/db.sql
volumes:
  pgdata:

networks:
    workingcalendar:
        # Общая сеть со смежными проектами
        name: 'workingcalendar'
        enable_ipv6: false
        # ipam:
        #   config:
        #     - subnet: 2001:0DB8::/112

    
