version: '3.4'

services:
  workingcalendar-server:
    # image: yellow444/workingcalendarserver:latest
    hostname: workingcalendar-server
    container_name: workingcalendar-server
    build:
      context: .
      dockerfile: WorkingCalendar.Server/Dockerfile
    environment:
      - ConnectionStrings__Postgres=Host=workingcalendar-postgres;Database=workingcalendar;Username=workingcalendar;Password=workingcalendar
    ports:
      - 20080:20080
      - 8080:8080
  workingcalendar-postgres:
    image: postgres
    hostname: workingcalendar-postgres
    container_name: workingcalendar-postgres
    environment:
      - POSTGRES_PASSWORD=workingcalendar
      - POSTGRES_ADMIN=workingcalendar
    ports:
      - 5432
    volumes:
      - ./pgdata:/var/lib/postgresql/data
      - ./init.pssql:/docker-entrypoint-initdb.d
  workingcalendar-client:
    build:
      context: .
      dockerfile: WorkingCalendar.Client/Dockerfile
    ports:
      - "3000:3000"

